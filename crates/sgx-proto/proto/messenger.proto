syntax = "proto3";

package messenger.v1;

import "google/protobuf/timestamp.proto";

// ==================== Service ====================

service MessengerService {
  rpc GetBackendInfo(GetBackendInfoRequest) returns (BackendInfo);
  rpc GetAuthState(GetAuthStateRequest) returns (AuthState);
  rpc SubmitPhoneNumber(SubmitPhoneNumberRequest) returns (SubmitPhoneNumberResponse);
  rpc SubmitAuthCode(SubmitAuthCodeRequest) returns (SubmitAuthCodeResponse);
  rpc SubmitPassword(SubmitPasswordRequest) returns (SubmitPasswordResponse);
  rpc ListChats(ListChatsRequest) returns (ListChatsResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc StreamUpdates(StreamUpdatesRequest) returns (stream Update);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc DownloadAvatar(DownloadAvatarRequest) returns (DownloadAvatarResponse);
}

// ==================== Common Types ====================

message ChatId {
  string backend = 1;
  string id = 2;
}

message MessageId {
  string backend = 1;
  string chat_id = 2;
  string id = 3;
}

// ==================== Backend Info ====================

message GetBackendInfoRequest {}

message BackendInfo {
  string backend_id = 1;
  string display_name = 2;
  string version = 3;
  bool is_authenticated = 4;
  string badge_label = 5;
  string badge_color = 6;
}

// ==================== Auth ====================

message GetAuthStateRequest {}

message AuthState {
  oneof state {
    WaitPhone wait_phone = 1;
    WaitCode wait_code = 2;
    WaitPassword wait_password = 3;
    Ready ready = 4;
    LoggedOut logged_out = 5;
    AuthError error = 6;
  }
}

message WaitPhone {}
message WaitCode { string phone_number_hint = 1; }
message WaitPassword { string password_hint = 1; }
message Ready { string user_id = 1; string display_name = 2; }
message LoggedOut {}
message AuthError { string message = 1; }

message SubmitPhoneNumberRequest { string phone_number = 1; }
message SubmitPhoneNumberResponse { bool success = 1; }

message SubmitAuthCodeRequest { string code = 1; }
message SubmitAuthCodeResponse { bool success = 1; }

message SubmitPasswordRequest { string password = 1; }
message SubmitPasswordResponse { bool success = 1; }

message LogoutRequest {}
message LogoutResponse { bool success = 1; }

// ==================== Chats ====================

message ListChatsRequest {
  int32 limit = 1;
  int64 offset_order = 2;
}

message ListChatsResponse {
  repeated Chat chats = 1;
}

message Chat {
  ChatId chat_id = 1;
  string title = 2;
  ChatType chat_type = 3;
  string avatar_url = 4;
  UnifiedMessage last_message = 5;
  int32 unread_count = 6;
  bool is_encrypted = 7;
  bool is_muted = 8;
  bool is_pinned = 9;
  google.protobuf.Timestamp last_activity = 10;
}

enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_PRIVATE = 1;
  CHAT_TYPE_GROUP = 2;
  CHAT_TYPE_CHANNEL = 3;
  CHAT_TYPE_BOT = 4;
}

// ==================== Messages ====================

message GetMessagesRequest {
  ChatId chat_id = 1;
  int32 limit = 2;
  string from_message_id = 3;
}

message GetMessagesResponse {
  repeated UnifiedMessage messages = 1;
}

message UnifiedMessage {
  MessageId message_id = 1;
  string sender_id = 2;
  string sender_name = 3;
  string sender_avatar_url = 4;
  google.protobuf.Timestamp timestamp = 5;
  bool is_outgoing = 6;
  oneof content {
    TextContent text = 10;
    MediaContent media = 11;
    StickerContent sticker = 12;
  }
  string reply_to_message_id = 20;
  bool is_edited = 21;
}

message TextContent {
  string body = 1;
}

message MediaContent {
  MediaType media_type = 1;
  string url = 2;
  string thumbnail_url = 3;
  string caption = 4;
  string file_name = 5;
  int64 file_size = 6;
}

enum MediaType {
  MEDIA_TYPE_UNSPECIFIED = 0;
  MEDIA_TYPE_PHOTO = 1;
  MEDIA_TYPE_VIDEO = 2;
  MEDIA_TYPE_AUDIO = 3;
  MEDIA_TYPE_DOCUMENT = 4;
  MEDIA_TYPE_VOICE = 5;
}

message StickerContent {
  string emoji = 1;
  string url = 2;
}

// ==================== Send ====================

message SendMessageRequest {
  ChatId chat_id = 1;
  oneof content {
    TextContent text = 10;
  }
  string reply_to_message_id = 20;
}

message SendMessageResponse {
  MessageId message_id = 1;
}

// ==================== Streaming ====================

message StreamUpdatesRequest {}

message Update {
  oneof update {
    NewMessage new_message = 1;
    MessageEdited message_edited = 2;
    MessageDeleted message_deleted = 3;
    ChatUpdated chat_updated = 4;
    TypingUpdate typing = 5;
    AuthStateChanged auth_state_changed = 6;
  }
}

message NewMessage {
  UnifiedMessage message = 1;
}

message MessageEdited {
  MessageId message_id = 1;
  string new_body = 2;
}

message MessageDeleted {
  MessageId message_id = 1;
}

message ChatUpdated {
  Chat chat = 1;
}

message TypingUpdate {
  ChatId chat_id = 1;
  repeated string user_ids = 2;
}

message AuthStateChanged {
  AuthState state = 1;
}

// ==================== Avatar Download ====================

message DownloadAvatarRequest {
  int32 file_id = 1;
}

message DownloadAvatarResponse {
  string data_url = 1; // base64 data URL (data:image/jpeg;base64,...)
}
